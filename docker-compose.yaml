
# =========================
# COMMON CONFIGURATIONS
# =========================
x-net: &net
  networks:
    - lynx-networks

# =========================
# SERVICES
# =========================
services:

  # --- DATABASES & CACHE ---
    postgres_source:
        <<: *net
        image: postgres:16-alpine
        container_name: postgres
        restart: always
        environment:
        - TZ=Asia/Ho_Chi_Minh
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
        command: 
            - "postgres"
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_replication_slots=4"  # Để dự phòng, có thể set > 1
            - "-c"
            - "max_wal_senders=4"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U finhouse -d finhouse"]
            interval: 5s
            timeout: 5s
            retries: 5
        ports:
        - "5432:5432"
        volumes:
        - postgres_data:/var/lib/postgresql/data 
        - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql

    redis:
        <<: *net
        image: redis:7-alpine
        container_name: redis
        restart: always
        ports:
        - "6379:6379"
        environment:
        - TZ=Asia/Ho_Chi_Minh
        volumes:
        - redis_data:/data

    # --- KAFKA & CDC (STREAMING) ---
    kafka:
        <<: *net
        image: apache/kafka:3.7.0
        container_name: kafka
        ports:
        - "9092:9092"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            TZ: Asia/Ho_Chi_Minh
        volumes:
        - kafka_data:/var/lib/kafka/data

    debezium-cdc:
        <<: *net
        build: ./services/debezium/
        container_name: debezium-cdc
        ports:
        - "8083:8083"
        environment:
            BOOTSTRAP_SERVERS: kafka:9092
            GROUP_ID: 1
            CONFIG_STORAGE_TOPIC: my_connect_configs
            OFFSET_STORAGE_TOPIC: my_connect_offsets
            STATUS_STORAGE_TOPIC: my_connect_statuses
            TZ: Asia/Ho_Chi_Minh
        depends_on:
        - kafka
        - postgres_source

    debezium-init:
        <<: *net
        build: ./services/debezium/
        container_name: debezium-init
        depends_on:
            debezium-cdc: 
                condition: service_started
        volumes:
            - ./services/debezium:/debezium
        # Chuyển dấu > thành | để bảo toàn cấu trúc xuống dòng của shell script
        command: |
            sh -c "
            echo '⏳ Đang chờ Debezium sẵn sàng...';
            
            while ! curl -s -f http://debezium-cdc:8083/ > /dev/null; do
                sleep 5;
            done;
            
            echo '\n';
            echo '✅ Debezium đã khởi động xong. Chờ thêm 5 giây để ổn định API...';
            sleep 5;
            
            echo '✅ Bắt đầu đăng ký Postgres Source Connector...';
            curl -i -X POST -H 'Accept:application/json' -H 'Content-Type:application/json' http://debezium-cdc:8083/connectors -d @/debezium/register-postgres.json;
            
            echo '\n✅ Bắt đầu đăng ký Redis Sink Connector...';
            curl -i -X POST -H 'Accept:application/json' -H 'Content-Type:application/json' http://debezium-cdc:8083/connectors -d @/debezium/register-redis.json;
            "

    flink-jobmanager:
        <<: *net
        build: ./services/flink
        container_name: flink-jobmanager
        ports:
            - "8084:8081" # Giao diện Web UI của Flink
        command: jobmanager
        environment:
            - |
              FLINK_PROPERTIES=
              jobmanager.rpc.address: flink-jobmanager

    flink-taskmanager:
        <<: *net
        build: ./services/flink
        container_name: flink-taskmanager
        depends_on:
            - flink-jobmanager
        command: taskmanager
        environment:
            - |
              FLINK_PROPERTIES=
              jobmanager.rpc.address: flink-jobmanager
              taskmanager.numberOfTaskSlots: 2 # Số luồng xử lý song song
    data-generator:
        <<: *net
        build: ./services/data-generator
        container_name: data-generator
        environment:
            KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            TZ: Asia/Ho_Chi_Minh
        depends_on:
            kafka:
                condition: service_started  # Trạng thái mặc định (chỉ cần khởi động)
            postgres_source: 
                condition: service_healthy  # Đợi healthcheck pass

    # --- DATA STAKE (MINIO, HIVE, TRINO) ---
    minio:
        <<: *net
        image: minio/minio
        container_name: minio
        command: server /data --console-address ":9001"
        ports:
        - "9002:9000"
        - "9001:9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
            TZ: ${TIMEZONE}
        volumes:
        - minio_data:/data
        - ./services/trino/catalog:/etc/trino/catalog

    minio-init:
        <<: *net
        image: minio/minio
        container_name: minio_setup
        entrypoint: ["/bin/sh", "/entrypoint.sh"]
        restart: "no"
        volumes:
        - ./services/minio/entrypoint.sh:/entrypoint.sh
        depends_on:
        - minio

    postgres-metastore:
        <<: *net
        image: postgres:15
        container_name: postgres-metastore
        ports:
        - "5433:5432"
        environment:
            POSTGRES_USER: ${HIVE_DB_USER}
            POSTGRES_PASSWORD: ${HIVE_DB_PASSWORD}
            POSTGRES_DB: ${HIVE_DB_NAME}
            TZ: ${TIMEZONE}

    hive-metastore:
        <<: *net
        build: ./services/hive
        container_name: hive-metastore
        ports:
        - "9083:9083"
        environment:
            SERVICE_NAME: metastore
            DB_DRIVER: postgres
            SERVICE_OPTS: >
                -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-metastore:5432/${HIVE_DB_NAME}
                -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
                -Djavax.jdo.option.ConnectionUserName=${HIVE_DB_USER}
                -Djavax.jdo.option.ConnectionPassword=${HIVE_DB_PASSWORD}
            AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
            AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
            AWS_REGION: ${AWS_DEFAULT_REGION}
            TZ: ${TIMEZONE}
        volumes:
        - ./services/hive/site.xml:/opt/hive/conf/hive-site.xml
        depends_on:
        - postgres-metastore

    trino:
        <<: *net
        image: trinodb/trino:475
        container_name: trino
        ports:
        - "8000:8080"
        environment:
            TZ: ${TIMEZONE}
        entrypoint: [ "/bin/sh", "/docker-init/entrypoint.sh" ]
        volumes:
        - ./services/trino/catalog:/etc/trino/catalog
        - ./services/trino/init_db.sql:/docker-init/init_db.sql
        - ./services/trino/entrypoint.sh:/docker-init/entrypoint.sh
        depends_on:
        - hive-metastore

    dbt: 
        <<: *net
        image: xemuliam/dbt:bigquery
        container_name: dbt
        volumes:
        - ./pipelines/dbt:/usr/app
        - ~/.dbt:/root/.dbt
        profiles: ["dbt_only"]

    # --- ORCHESTRATION & BI ---
    airflow:
        <<: *net
        image: apache/airflow:2.8.1
        container_name: airflow-standalone
        command: standalone
        ports:
        - "8080:8080"
        environment:
        - AIRFLOW__CORE__LOAD_EXAMPLES=False
        - TZ=Asia/Ho_Chi_Minh
        volumes:
        - ./dags:/opt/airflow/dags
        - ./services/airflow/logs:/opt/airflow/logs
        -   ./services/airflow/scheduler:/opt/airflow/scheduler
    superset:
        <<: *net
        build: ./services/superset
        container_name: superset
        ports:
        - "8088:8088"
        environment:
            SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
            SUPERSET_DATABASE_URI: postgresql+psycopg2://${SUPERSET_DB_USER}:${SUPERSET_DB_PASSWORD}@superset-db:5432/${SUPERSET_DB_NAME}
            TZ: ${TIMEZONE}
        volumes:
        - superset_home:/app/superset_home
        depends_on:
        - trino
        - superset-db

    superset-db:
        <<: *net
        image: postgres:15 
        container_name: superset-db
        environment:
            POSTGRES_DB: ${SUPERSET_DB_NAME}
            POSTGRES_USER: ${SUPERSET_DB_USER}
            POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD}
            TZ: ${TIMEZONE}
        volumes:
        - superset_db:/var/lib/postgresql/data

    # --- SPARK ---
    spark-master:
        <<: *net
        build: ./services/spark/
        container_name: spark-master
        hostname: spark-master
        ports:
        - "8082:8080"
        - "7077:7077"
        environment:
            TZ: ${TIMEZONE}
        command: >
            /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
        volumes:
        - ./pipelines/spark-jobs:/opt/spark/jobs

    spark-worker:
        <<: *net
        build: ./services/spark/ 
        container_name: spark-worker
        hostname: spark-worker
        environment:
        - SPARK_MODE=worker
        - SPARK_MASTER_URL=spark://spark-master:7077
        - SPARK_WORKER_CORES=1
        - SPARK_WORKER_MEMORY=1024m
        - TZ=${TIMEZONE}
        command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
        depends_on:
        - spark-master

    # --- MLOPS & MODEL SERVING ---
    mlflow:
        <<: *net
        image: ghcr.io/mlflow/mlflow:v2.11.1
        container_name: mlflow
        ports:
        - "5000:5000"
        command: >
            mlflow server
            --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            --default-artifact-root s3://mlflow-artifacts/
            --host 0.0.0.0
        environment:
        - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
        - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
        - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
        - TZ=Asia/Ho_Chi_Minh
        depends_on:
        - postgres_source
        - minio

    # --- WEB APPLICATIONS ---
    backend:
        <<: *net
        build: ./backend
        container_name: backend
        ports:
        - "8001:8001"
        volumes:
        - ./backend:/app
        restart: always
        env_file:
        - .env  

    frontend:
        <<: *net
        build: ./frontend
        container_name: frontend
        ports:
        - "8501:8501"  # Thay đổi port từ 3000 sang 8501
        environment:
        - API_URL=http://backend:8001
        depends_on:
        - backend
    

    # =========================
    # VOLUMES & NETWORKS
    # =========================
volumes:
    postgres_data:
    redis_data:
    kafka_data:
    minio_data:
    superset_home:
    superset_db:

networks:
    lynx-networks:
        driver: bridge